# =============================================================================
# Cloud SQL Auth Proxy — sidecar for GKE + Cloud SQL (managed PostgreSQL)
#
# Why Cloud SQL instead of the in-cluster PostgreSQL StatefulSet?
# ─────────────────────────────────────────────────────────────────
# - Automated backups, point-in-time recovery, and HA out of the box
# - Automatic minor-version patching (no manual `kubectl exec` into DB pods)
# - Private IP: the DB never leaves the GCP VPC → lower latency, no TLS overhead
# - Autopilot doesn't support StatefulSets with local storage well (Autopilot
#   uses ephemeral nodes; PVC re-attachment adds failover latency)
#
# Architecture:
#   Spring Boot → localhost:5432 → Cloud SQL Auth Proxy (sidecar) → Cloud SQL
#   The proxy opens an encrypted tunnel using Workload Identity (no password
#   in the pod — IAM credentials are injected automatically by GKE).
#
# Setup steps (one-time, run from Cloud Shell or gcloud CLI):
# ─────────────────────────────────────────────────────────────
# 1. Create the Cloud SQL instance:
#      gcloud sql instances create iris-db \
#        --database-version=POSTGRES_17 \
#        --tier=db-g1-small \
#        --region=${GKE_REGION} \
#        --no-assign-ip \
#        --network=default
#
# 2. Create the database and user:
#      gcloud sql databases create iris --instance=iris-db
#      gcloud sql users create demo --instance=iris-db --password=<DB_PASSWORD>
#
# 3. Get the instance connection name (used in the proxy --instance flag):
#      gcloud sql instances describe iris-db --format='value(connectionName)'
#    → ${GCP_PROJECT}:${GKE_REGION}:iris-db
#
# 4. Enable Workload Identity on the GKE cluster:
#      gcloud container clusters update ${GKE_CLUSTER} \
#        --region ${GKE_REGION} \
#        --workload-pool=${GCP_PROJECT}.svc.id.goog
#
# 5. Create a GCP service account for the proxy:
#      gcloud iam service-accounts create iris-sql-proxy \
#        --display-name="Iris Cloud SQL Proxy"
#      gcloud projects add-iam-policy-binding ${GCP_PROJECT} \
#        --member="serviceAccount:iris-sql-proxy@${GCP_PROJECT}.iam.gserviceaccount.com" \
#        --role="roles/cloudsql.client"
#
# 6. Bind the K8s service account to the GCP service account (Workload Identity):
#      kubectl create serviceaccount iris-backend -n app
#      gcloud iam service-accounts add-iam-policy-binding \
#        iris-sql-proxy@${GCP_PROJECT}.iam.gserviceaccount.com \
#        --role="roles/iam.workloadIdentityUser" \
#        --member="serviceAccount:${GCP_PROJECT}.svc.id.goog[app/iris-backend]"
#      kubectl annotate serviceaccount iris-backend -n app \
#        iam.gke.io/gcp-service-account=iris-sql-proxy@${GCP_PROJECT}.iam.gserviceaccount.com
#
# After setup, patch the backend Deployment to:
#   - Use serviceAccountName: iris-backend
#   - Add the cloud-sql-proxy sidecar container (see below)
#   - Set DB_HOST=127.0.0.1 (the proxy listens on localhost)
# =============================================================================
---
# Kubernetes ServiceAccount bound to the GCP service account via Workload Identity.
# The annotation is what triggers GKE to mount an OIDC token that the Cloud SQL
# Auth Proxy uses to authenticate without a key file.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iris-backend
  namespace: app
  labels:
    app.kubernetes.io/name: iris-backend
    app.kubernetes.io/component: backend
  annotations:
    # Replace with your GCP project ID — set at deploy time via envsubst
    iam.gke.io/gcp-service-account: "iris-sql-proxy@${GCP_PROJECT}.iam.gserviceaccount.com"
---
# ConfigMap: GKE-specific overrides for the backend ConfigMap.
# DB_HOST=127.0.0.1 because the Cloud SQL Auth Proxy listens on localhost inside the pod.
# Apply this AFTER deploy/kubernetes/backend/configmap.yaml to override DB_HOST.
apiVersion: v1
kind: ConfigMap
metadata:
  name: iris-config-gke-overrides
  namespace: app
  labels:
    app.kubernetes.io/name: iris
    app.kubernetes.io/component: backend-gke-overrides
data:
  # Cloud SQL Auth Proxy sidecar listens on localhost:5432 — no cross-pod networking needed.
  DB_HOST: "127.0.0.1"
  DB_PORT: "5432"

# =============================================================================
# To add the Cloud SQL Auth Proxy sidecar to the backend Deployment, patch it:
#
#   kubectl patch deployment iris -n app --type=json -p='[
#     {
#       "op": "add",
#       "path": "/spec/template/spec/serviceAccountName",
#       "value": "iris-backend"
#     },
#     {
#       "op": "add",
#       "path": "/spec/template/spec/containers/-",
#       "value": {
#         "name": "cloud-sql-proxy",
#         "image": "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.1",
#         "args": [
#           "--structured-logs",
#           "--port=5432",
#           "--auto-iam-authn",
#           "GCP_PROJECT:REGION:iris-db"
#         ],
#         "resources": {
#           "requests": {"memory": "32Mi", "cpu": "10m"},
#           "limits":   {"memory": "64Mi", "cpu": "100m"}
#         },
#         "securityContext": {"allowPrivilegeEscalation": false}
#       }
#     }
#   ]'
#
# Or embed the sidecar directly in the Deployment manifest for a permanent setup.
# =============================================================================
