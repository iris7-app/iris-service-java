# .gitlab-ci/release.yml — extracted 2026-04-22 from .gitlab-ci.yml
# Phase B-2 CI modularisation (ADR-0050). Contains: pages.
# The parent `.gitlab-ci.yml` keeps only workflow/stages/default/
# variables/cache/include. See docs/adr/0050-ci-yaml-modularisation-plan.md.
#
# Release automation — 2026-04-23 : release-please removed entirely (it was
# GitHub-API-only, 401 Bad Credentials on GitLab PAT — see pipeline #660).
# CHANGELOG + GitLab Release creation now ship as local shell scripts under
# `bin/ship/` invoked manually after a stable-v* tag push :
#
#   bin/ship/changelog.sh                 # prepend entries since last stable-v*
#   git add CHANGELOG.md && git commit -m "chore(changelog): bump for vX.Y.Z"
#   git tag -a stable-vX.Y.Z -m "..."
#   git push origin stable-vX.Y.Z
#   bin/ship/gitlab-release.sh stable-vX.Y.Z
#
# Why no CI job here : a CI job on tag-push would trigger the full
# security + docker-build + deploy stages on every stable-v* tag (15-30 min
# free-runner time × ~3-6 tags/day). The pre-merge MR pipeline already
# validated the commit ; the tag is just a named pointer. A local shell
# script creates the same Release object in ~1 s with zero CI burn.

pages:
  stage: pages
  image: alpine:3.20
  interruptible: false
  script:
    - echo "Publishing public/ to GitLab Pages"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "public/**/*"
        - ".gitlab-ci.yml"
