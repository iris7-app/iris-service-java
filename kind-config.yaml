# =============================================================================
# kind cluster config — local development
#
# Creates a single-node cluster that:
#   - Maps host ports 8090 (HTTP) and 8443 (HTTPS) to the Nginx Ingress inside
#     the cluster. Access the app at http://localhost:8090 after deployment.
#   - Connects to a local Docker registry running at localhost:5001 so images
#     built locally can be pulled without pushing to a remote registry.
#
# Usage:
#   ./scripts/deploy-local.sh         # creates cluster + deploys everything
#   kind delete cluster --name customer-service   # tear down
# =============================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

# Tell containerd inside the cluster to resolve localhost:5001 → local registry
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = ""

    # registry:2 listens on port 5000 inside the container;
    # the host maps it to 5001. Inside the kind network, use port 5000.
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://registry:5000"]

nodes:
  - role: control-plane
    # v1.31.4: last LTS tested to work reliably with kind v0.31 on macOS.
    # v1.35.0 (kind default) has a kubelet startup timeout on macOS Docker Desktop.
    image: kindest/node:v1.31.4
    # Label required by the nginx-ingress kind manifest to bind to this node
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80    # Nginx Ingress HTTP  → http://localhost:8090
        hostPort: 8090
        protocol: TCP
      - containerPort: 443   # Nginx Ingress HTTPS → https://localhost:8443
        hostPort: 8443
        protocol: TCP
