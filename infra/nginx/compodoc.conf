# Nginx configuration for the Compodoc Angular documentation site.
#
# Serves the static HTML generated by `npm run compodoc` in iris-ui.
# Compodoc generates an API reference for all Angular components, services,
# interfaces, and routes — analogous to Javadoc for the Java backend.
#
# Access: http://localhost:8085

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ $uri.html =404;

        add_header Cache-Control "public, max-age=3600, s-maxage=14400";

        # Allow the Angular dev server to probe availability
        add_header Access-Control-Allow-Origin "http://localhost:4200" always;
    }

    location ~* \.(css|png|gif|jpg|ico|js|woff|woff2|ttf|svg)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    autoindex off;

    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
