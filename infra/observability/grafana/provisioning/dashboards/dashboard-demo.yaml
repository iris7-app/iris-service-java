apiVersion: 1

# Grafana dashboard provisioning — Prometheus-only stack variant
#
# This file is loaded by the standalone Grafana instance (docker-compose.observability.yml).
# It registers demo.json as a dashboard at startup.
#
# Stack: Micrometer → Prometheus scrape → Grafana
# Datasource used by demo.json: Prometheus
#
# Difference from dashboards-lgtm/dashboard-demo-lgtm.yaml:
#   Metric names use the _seconds_ suffix (Micrometer direct-scrape convention) instead
#   of _milliseconds_ (OTel SDK convention). Both dashboards track the same business
#   signals — only the unit suffix differs.
#
# Path inside the Grafana container: /var/lib/grafana/dashboards
# (mounted via docker-compose.observability.yml volume mount)

providers:
  - name: customerservice
    orgId: 1
    folder: customerservice   # dashboard folder visible in the Grafana UI
    type: file
    disableDeletion: false    # allow manual deletion from the Grafana UI without it being re-created on next reload
    updateIntervalSeconds: 10 # hot-reload interval — changes to demo.json appear within 10 s
    options:
      path: /var/lib/grafana/dashboards  # absolute path inside the Grafana container (see docker-compose.observability.yml volume mount)
