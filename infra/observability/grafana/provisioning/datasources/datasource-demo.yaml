apiVersion: 1

# Grafana datasource provisioning — Prometheus-only stack variant
#
# Loaded by the standalone Grafana instance at startup (docker-compose.observability.yml).
# Registers Prometheus as the default datasource so dashboard queries work out of the box.
#
# Prometheus scrapes /actuator/prometheus on the customer-service container every 5 s
# (configured in infra/observability/prometheus/prometheus.yml).
#
# The LGTM stack (grafana/otel-lgtm) has its own bundled datasources and does not
# use this file.

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy        # Grafana proxies queries to Prometheus — the browser never calls Prometheus directly
    url: http://prometheus:9090  # service name resolved by Docker Compose internal DNS
    isDefault: true      # panels that omit an explicit datasource fall back to this one
