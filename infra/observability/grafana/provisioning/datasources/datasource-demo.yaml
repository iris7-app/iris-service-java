apiVersion: 1

# Grafana datasource provisioning — full observability stack (Option A)
#
# Loaded by the standalone Grafana instance at startup (docker-compose.observability.yml).
#
# Three datasources covering metrics + traces + logs with cross-signal correlations:
#
#   Prometheus  — metrics scraped from /actuator/prometheus (seconds suffix)
#   Tempo       — traces received via OTLP push into the LGTM container (port 3200)
#   Loki        — logs received via OTLP push into the LGTM container (port 3100)
#
# Correlations configured:
#   Tempo  → Loki      : span view shows "Logs" tab with matching log lines (±1 min)
#   Tempo  → Prometheus: span view overlays metric charts for the same service
#   Loki   → Tempo     : traceId field in log lines becomes a clickable link to Tempo
#   Prometheus → Tempo : exemplar dots on metric graphs link to the matching trace
#
# All URLs use Docker Compose internal DNS — the browser never calls these directly.
# Tempo and Loki run inside the LGTM container (customerservice-lgtm), reachable
# by the Grafana container as "lgtm" on their internal ports (3200 / 3100).

datasources:

  # ── Prometheus — default datasource, metric names use _seconds_ suffix ─────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      # Exemplars: Prometheus 2.x + Micrometer expose traceId on histogram metrics.
      # Clicking an exemplar dot on a latency graph opens the matching Tempo trace.
      exemplarTraceIdDestinations:
        - datasourceUid: tempo
          name: trace_id        # label name set by Micrometer exemplar support

  # ── Tempo — distributed tracing backend (inside LGTM container) ───────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://lgtm:3200     # Tempo HTTP query API, exposed on host port 3200
    jsonData:
      httpMethod: GET

      # Trace → Logs: span detail panel shows a "Logs" button that runs a Loki query
      # filtered by traceId and scoped to ±1 min around the span start/end times.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false    # use auto-generated LogQL (no manual query needed)

      # Trace → Metrics: span detail panel overlays Prometheus charts for the
      # same service_name tag, making it easy to correlate a slow trace with
      # a spike in latency or error rate.
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        tags:
          - key: service.name   # OTel resource attribute set by Spring Boot
            value: job          # maps to the Prometheus job label

      # Service map: renders a topology graph using Prometheus span metrics
      # (requires metrics-generator in Tempo, or service graph metrics from OTel collector)
      serviceMap:
        datasourceUid: prometheus

      # Node graph view in trace detail
      nodeGraph:
        enabled: true

      # Loki search: "Logs for this service" shortcut in Explore uses Loki datasource
      lokiSearch:
        datasourceUid: loki

      search:
        hide: false

  # ── Loki — log aggregation backend (inside LGTM container) ────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://lgtm:3100     # Loki API — not exposed to host directly, only via cors-proxy
    jsonData:
      # Log → Trace: derived field extracts the traceId from each log line and
      # renders it as a clickable link that opens the matching trace in Tempo.
      # Spring Boot OTel logs include traceId as a structured JSON field.
      derivedFields:
        - name: TraceID
          datasourceUid: tempo
          matcherRegex: '"traceId":"([a-f0-9]{32})"'
          url: '${__value.raw}'
          urlDisplayLabel: 'Open in Tempo'
