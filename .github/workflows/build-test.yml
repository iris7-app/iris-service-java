name: build-test

# Backup CI gate (per ADR-0069 double-CI). Runs Maven verify on Linux
# amd64 native (no arm64 Mac quirks). The full GitLab CI is the
# reference — this workflow is the safety net.

on:
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - ".github/workflows/build-test.yml"
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - ".github/workflows/build-test.yml"

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_DB: iris
          POSTGRES_USER: iris
          POSTGRES_PASSWORD: iris
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: setup-jdk-25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: mvn verify
        run: ./mvnw -B verify -Dspotbugs.skip=true -Dpitest.skip=true
        env:
          IRIS_DB__HOST: localhost
          IRIS_DB__PORT: "5432"
          IRIS_DB__USER: iris
          IRIS_DB__PASSWORD: iris
          IRIS_DB__NAME: iris
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-reports
          path: target/failsafe-reports/
          retention-days: 7
