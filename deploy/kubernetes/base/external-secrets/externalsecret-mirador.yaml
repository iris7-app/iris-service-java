# =============================================================================
# ExternalSecret — mirador-secrets (app + infra)
#
# Projects the six GSM entries into two identical `mirador-secrets` Kubernetes
# Secrets (one per consumer namespace). `refreshInterval: 1h` picks up password
# rotations within the hour; forced refresh is available via
#   kubectl annotate externalsecret mirador-secrets -n app \
#     force-sync=$(date +%s) --overwrite
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mirador-secrets
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: mirador-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mirador-db-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: mirador-jwt-secret
    - secretKey: API_KEY
      remoteRef:
        key: mirador-api-key
    - secretKey: GITLAB_API_TOKEN
      remoteRef:
        key: mirador-gitlab-api-token
    - secretKey: OTEL_EXPORTER_OTLP_AUTH
      remoteRef:
        key: mirador-otel-auth
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mirador-secrets
  namespace: infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: mirador-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mirador-db-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: mirador-jwt-secret
    - secretKey: API_KEY
      remoteRef:
        key: mirador-api-key
    - secretKey: GITLAB_API_TOKEN
      remoteRef:
        key: mirador-gitlab-api-token
    - secretKey: OTEL_EXPORTER_OTLP_AUTH
      remoteRef:
        key: mirador-otel-auth
