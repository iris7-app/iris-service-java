# =============================================================================
# ExternalSecret — keycloak-secrets (infra)
#
# Mirrors the hand-created secret from MR 64 era, but sourced from GSM.
# Keys:
#   KEYCLOAK_ADMIN          — initial admin username (demo = "admin")
#   KEYCLOAK_ADMIN_PASSWORD — initial admin password
#   KC_DB_PASSWORD          — shared with Postgres DB_PASSWORD
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-secrets
  namespace: infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: keycloak-secrets
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_ADMIN
      remoteRef:
        key: mirador-keycloak-admin
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: mirador-keycloak-admin-password
    - secretKey: KC_DB_PASSWORD
      remoteRef:
        key: mirador-keycloak-kc-db-password
