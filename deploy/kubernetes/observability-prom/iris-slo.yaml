      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_mode: cli-gen-prom
        sloth_objective: '99'
        sloth_service: iris-service
        sloth_slo: availability
        sloth_spec: prometheus/v1
        sloth_version: 0.16.0
        team: iris
        tier: demo
  - name: sloth-slo-alerts-iris-service-availability
    rules:
    - alert: IrisServiceAvailabilitySLO
      expr: "(\n    max(slo:sli_error:ratio_rate5m{sloth_id=\"iris-service-availability\", sloth_service=\"iris-service\"\
        , sloth_slo=\"availability\"} > (14.4 * 0.01)) without (sloth_window)\n    and\n    max(slo:sli_error:ratio_rate1h{sloth_id=\"\
        iris-service-availability\", sloth_service=\"iris-service\", sloth_slo=\"availability\"} > (14.4 * 0.01)) without\
        \ (sloth_window)\n)\nor\n(\n    max(slo:sli_error:ratio_rate30m{sloth_id=\"iris-service-availability\", sloth_service=\"\
        iris-service\", sloth_slo=\"availability\"} > (6 * 0.01)) without (sloth_window)\n    and\n    max(slo:sli_error:ratio_rate6h{sloth_id=\"\
        iris-service-availability\", sloth_service=\"iris-service\", sloth_slo=\"availability\"} > (6 * 0.01)) without\
        \ (sloth_window)\n)\n"
      labels:
        category: availability
        channel: pager
        severity: critical
        sloth_severity: page
      annotations:
        runbook_url: https://gitlab.com/iris-7/iris-service-java/-/blob/main/docs/runbooks/slo-availability.md
        summary: Availability SLO error budget burning
        title: (page) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget burn rate is too fast.
    - alert: IrisServiceAvailabilitySLO
      expr: "(\n    max(slo:sli_error:ratio_rate2h{sloth_id=\"iris-service-availability\", sloth_service=\"iris-service\"\
        , sloth_slo=\"availability\"} > (3 * 0.01)) without (sloth_window)\n    and\n    max(slo:sli_error:ratio_rate1d{sloth_id=\"\
        iris-service-availability\", sloth_service=\"iris-service\", sloth_slo=\"availability\"} > (3 * 0.01)) without\
        \ (sloth_window)\n)\nor\n(\n    max(slo:sli_error:ratio_rate6h{sloth_id=\"iris-service-availability\", sloth_service=\"\
        iris-service\", sloth_slo=\"availability\"} > (1 * 0.01)) without (sloth_window)\n    and\n    max(slo:sli_error:ratio_rate3d{sloth_id=\"\
        iris-service-availability\", sloth_service=\"iris-service\", sloth_slo=\"availability\"} > (1 * 0.01)) without\
        \ (sloth_window)\n)\n"
      labels:
        category: availability
        channel: ticket
        severity: warning
        sloth_severity: ticket
      annotations:
        runbook_url: https://gitlab.com/iris-7/iris-service-java/-/blob/main/docs/runbooks/slo-availability.md
        summary: Availability SLO error budget burning
        title: (ticket) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget burn rate is too fast.
