# =============================================================================
# deploy/kubernetes/observability-prom/iris-slo.yaml
#
# SLO recording + multi-window multi-burn-rate alerting rules. Generated by
# Sloth (https://sloth.dev/) from `iris-service-java/docs/slo/slo.yaml`.
#
# DO NOT EDIT manually. Regenerate after editing the source SLO YAML :
#
#   cd <repo>/iris-service-java
#   sloth generate -i docs/slo/slo.yaml -o /tmp/iris-slo-rules.yaml
#   python3 docs/slo/wrap-as-prometheusrule.py  # wraps Sloth output as K8s CRD
#
# Pattern : Google SRE Workbook ch. 5 — multi-window multi-burn-rate.
# 4 alerts per SLO (2 page = critical 1h+6h burn, 2 ticket = warning 1d+3d burn).
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: iris-slo
  labels:
    release: prometheus-stack
    role: alert-rules
    app.kubernetes.io/part-of: iris
spec:
  groups:
  - name: sloth-slo-sli-recordings-iris-service-availability
    rules:
    - record: slo:sli_error:ratio_rate5m
      expr: '(sum(rate(http_server_requests_seconds_count{job="iris-service",status=~"5.."}[5m]))

        )

        /

        (sum(rate(http_server_requests_seconds_count{job="iris-service"}[5m]))

        )

        '
      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_service: iris-service
        sloth_slo: availability
        sloth_window: 5m
        team: iris
        tier: demo
    - record: slo:sli_error:ratio_rate30m
      expr: '(sum(rate(http_server_requests_seconds_count{job="iris-service",status=~"5.."}[30m]))

        )

        /

        (sum(rate(http_server_requests_seconds_count{job="iris-service"}[30m]))

        )

        '
      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_service: iris-service
        sloth_slo: availability
        sloth_window: 30m
        team: iris
        tier: demo
    - record: slo:sli_error:ratio_rate1h
      expr: '(sum(rate(http_server_requests_seconds_count{job="iris-service",status=~"5.."}[1h]))

        )

        /

        (sum(rate(http_server_requests_seconds_count{job="iris-service"}[1h]))

        )

        '
      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_service: iris-service
        sloth_slo: availability
        sloth_window: 1h
        team: iris
        tier: demo
    - record: slo:sli_error:ratio_rate2h
      expr: '(sum(rate(http_server_requests_seconds_count{job="iris-service",status=~"5.."}[2h]))

        )

        /

        (sum(rate(http_server_requests_seconds_count{job="iris-service"}[2h]))

        )

        '
      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_service: iris-service
        sloth_slo: availability
        sloth_window: 2h
        team: iris
        tier: demo
    - record: slo:sli_error:ratio_rate6h
      expr: '(sum(rate(http_server_requests_seconds_count{job="iris-service",status=~"5.."}[6h]))

        )

        /

        (sum(rate(http_server_requests_seconds_count{job="iris-service"}[6h]))

        )

        '
      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_service: iris-service
        sloth_slo: availability
        sloth_window: 6h
        team: iris
        tier: demo
    - record: slo:sli_error:ratio_rate1d
      expr: '(sum(rate(http_server_requests_seconds_count{job="iris-service",status=~"5.."}[1d]))

        )

        /

        (sum(rate(http_server_requests_seconds_count{job="iris-service"}[1d]))

        )

        '
      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_service: iris-service
        sloth_slo: availability
        sloth_window: 1d
        team: iris
        tier: demo
    - record: slo:sli_error:ratio_rate3d
