        sloth_service: iris-service
        sloth_slo: availability
        sloth_window: 3d
        team: iris
        tier: demo
    - record: slo:sli_error:ratio_rate30d
      expr: 'sum_over_time(slo:sli_error:ratio_rate5m{sloth_id="iris-service-availability", sloth_service="iris-service",
        sloth_slo="availability"}[30d])

        / ignoring (sloth_window)

        count_over_time(slo:sli_error:ratio_rate5m{sloth_id="iris-service-availability", sloth_service="iris-service",
        sloth_slo="availability"}[30d])

        '
      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_service: iris-service
        sloth_slo: availability
        sloth_window: 30d
        team: iris
        tier: demo
