        / on(sloth_id, sloth_slo, sloth_service) group_left

        slo:error_budget:ratio{sloth_id="iris-service-availability", sloth_service="iris-service", sloth_slo="availability"}

        '
      labels:
        app: iris-service
        sloth_id: iris-service-availability
        sloth_service: iris-service
        sloth_slo: availability
        team: iris
        tier: demo
    - record: slo:period_burn_rate:ratio
